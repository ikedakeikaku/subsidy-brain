program_id: sample_hanro_kaitaku_v1
canonical_name: 販路開拓支援補助金（架空・デモ用）
quality_score_target: 85

sections:
  - section_id: section_1_1
    display_name: 1-1. 自社の概要
    target_chars: 600
    min_chars: 450
    max_chars: 800
    requires_data_paths:
      - company.name
      - company.business_description
      - company.industry

  - section_id: section_1_2
    display_name: 1-2. 売上・利益の状況
    target_chars: 800
    min_chars: 600
    max_chars: 1000
    requires_data_paths:
      - financial.past_3y_pl

  - section_id: section_1_3
    display_name: 1-3. 経営課題
    target_chars: 600
    min_chars: 450
    max_chars: 800
    requires_data_paths:
      - challenges

  - section_id: section_2_1
    display_name: 2-1. 市場の動向
    target_chars: 800
    min_chars: 600
    max_chars: 1000
    requires_data_paths:
      - target_market

  - section_id: section_3
    display_name: "3. 強み・弱み"
    target_chars: 600
    min_chars: 450
    max_chars: 800
    requires_data_paths:
      - strengths

  - section_id: section_4_2
    display_name: 4-2. 今後のプラン（施策）
    target_chars: 1200
    min_chars: 900
    max_chars: 1500
    requires_data_paths:
      - planned_project.initiatives

  - section_id: section_effect
    display_name: 補助事業の効果
    target_chars: 600
    min_chars: 450
    max_chars: 800
    requires_data_paths:
      - planned_project.expected_outcomes

  - section_id: bonus_env_change
    display_name: 【重点政策加点】事業環境変化加点
    target_chars: 500
    min_chars: 350
    max_chars: 600
    requires_data_paths:
      - bonus_points.env_change

charts:
  - chart_id: chart_revenue_trend
    chart_type: revenue_trend
    title: 過去3期の売上推移
    data_path: financial.past_3y_pl
    place_after_section: section_1_2

  - chart_id: chart_effect_before_after
    chart_type: effect_before_after
    title: 補助事業による売上効果（年商）
    data_path: planned_project.expected_outcomes
    place_after_section: section_effect

tables:
  - table_id: table_schedule
    table_type: schedule
    title: スケジュール（採択〜補助事業終了後の展開）
    columns: [時期, 項目, 内容]
    data_path: planned_project.schedule
    place_after_section: section_4_2

  - table_id: table_expense
    table_type: expense_breakdown
    title: 経費明細
    columns: [区分, 明細, 金額（円）]
    data_path: expenses.breakdown
    place_after_section: section_effect
