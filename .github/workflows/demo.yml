name: ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  lint-test-demo:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install uv
        run: pipx install uv

      - name: Install dependencies (incl. dev)
        run: uv sync --extra dev

      - name: Lint (ruff)
        run: uv run ruff check .

      - name: Tests (pytest)
        run: uv run pytest -ra

      - name: Run demo (offline mock)
        run: uv run python demo/run_demo.py

      - name: Run demo (live, only if secret is set)
        if: ${{ env.HAS_KEY == 'true' }}
        env:
          HAS_KEY: ${{ secrets.ANTHROPIC_API_KEY != '' }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: uv run python demo/run_demo.py --live

      - name: Upload generated sample
        uses: actions/upload-artifact@v4
        with:
          name: sample-application
          path: demo/output/
          retention-days: 30
