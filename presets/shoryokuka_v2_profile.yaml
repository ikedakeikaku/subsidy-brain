program_id: shoryokuka_v2
canonical_name: 中小企業省力化投資補助金（一般型）第2回
quality_score_target: 88

# 省力化補助金は「投資回収期間」「生産性向上率」「賃金引上げ」が三大評価軸
sections:
  - section_id: business_overview
    display_name: "1. 事業者概要・現状"
    target_chars: 800
    min_chars: 600
    max_chars: 1000
    requires_data_paths: [company.name, company.business_description]
  - section_id: labor_shortage_diagnosis
    display_name: "2-1. 人手不足の現状と課題"
    target_chars: 1000
    min_chars: 800
    max_chars: 1300
    requires_data_paths: [challenges]
  - section_id: investment_plan
    display_name: "2-2. 省力化投資の内容と目的"
    target_chars: 1200
    min_chars: 900
    max_chars: 1500
    requires_data_paths: [planned_project.initiatives]
  - section_id: productivity_uplift
    display_name: "2-3. 生産性向上効果（労働生産性向上率）"
    target_chars: 1000
    min_chars: 800
    max_chars: 1300
    requires_data_paths: [planned_project.expected_outcomes]
  - section_id: investment_payback
    display_name: "2-4. 投資回収シミュレーション"
    target_chars: 1000
    min_chars: 800
    max_chars: 1300
  - section_id: wage_increase_plan
    display_name: "3. 賃金引上げ計画（給与支給総額1.5%以上の引上げ）"
    target_chars: 800
    min_chars: 600
    max_chars: 1000
  - section_id: implementation_schedule
    display_name: "4. 実施スケジュール"
    target_chars: 700
    min_chars: 500
    max_chars: 900
    requires_data_paths: [planned_project.schedule]
  - section_id: risk_management
    display_name: "5. リスクと対応策"
    target_chars: 600
    min_chars: 450
    max_chars: 800

charts:
  - chart_id: chart_revenue_trend
    chart_type: revenue_trend
    title: 過去3期の売上推移
    data_path: financial.past_3y_pl
    place_after_section: business_overview
  - chart_id: chart_effect_before_after
    chart_type: effect_before_after
    title: 省力化投資の売上効果
    data_path: planned_project.expected_outcomes
    place_after_section: productivity_uplift

tables:
  - table_id: table_schedule
    table_type: schedule
    title: 投資実行スケジュール
    columns: [時期, 項目, 内容]
    data_path: planned_project.schedule
    place_after_section: implementation_schedule
  - table_id: table_expense
    table_type: expense_breakdown
    title: 設備投資・経費明細
    columns: [区分, 明細, 金額（円）]
    data_path: expenses.breakdown
    place_after_section: investment_payback
