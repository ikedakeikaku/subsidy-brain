program_id: jizoku_19
canonical_name: 小規模事業者持続化補助金 第19回
quality_score_target: 88

sections:
  - section_id: section_1_1
    display_name: 1-1. 自社の概要
    target_chars: 700
    min_chars: 500
    max_chars: 900
    requires_data_paths: [company.name, company.business_description, company.industry]
  - section_id: section_1_2
    display_name: 1-2. 売上・利益の状況
    target_chars: 900
    min_chars: 700
    max_chars: 1100
    requires_data_paths: [financial.past_3y_pl]
  - section_id: section_1_3
    display_name: 1-3. 経営課題
    target_chars: 700
    min_chars: 500
    max_chars: 900
    requires_data_paths: [challenges]
  - section_id: section_2_1
    display_name: 2-1. 市場の動向
    target_chars: 900
    min_chars: 700
    max_chars: 1100
    requires_data_paths: [target_market]
  - section_id: section_2_2
    display_name: 2-2. 顧客ニーズ
    target_chars: 700
    min_chars: 500
    max_chars: 900
    requires_data_paths: [target_market]
  - section_id: section_3
    display_name: "3. 強み・弱み"
    target_chars: 700
    min_chars: 500
    max_chars: 900
    requires_data_paths: [strengths]
  - section_id: section_4_1
    display_name: 4-1. 経営方針・目標
    target_chars: 700
    min_chars: 500
    max_chars: 900
    requires_data_paths: [planned_project.goal]
  - section_id: section_4_2
    display_name: 4-2. 今後のプラン（施策）
    target_chars: 1400
    min_chars: 1100
    max_chars: 1700
    requires_data_paths: [planned_project.initiatives]
  - section_id: section_effect
    display_name: 補助事業の効果
    target_chars: 700
    min_chars: 500
    max_chars: 900
    requires_data_paths: [planned_project.expected_outcomes]
  - section_id: bonus_env_change
    display_name: 【重点政策加点】事業環境変化加点
    target_chars: 500
    min_chars: 350
    max_chars: 600
  - section_id: bonus_wage_increase
    display_name: 【政策加点】賃金引上げ加点
    target_chars: 400
    min_chars: 300
    max_chars: 500

charts:
  - chart_id: chart_revenue_trend
    chart_type: revenue_trend
    title: 過去3期の売上推移
    data_path: financial.past_3y_pl
    place_after_section: section_1_2
  - chart_id: chart_effect_before_after
    chart_type: effect_before_after
    title: 補助事業による売上効果
    data_path: planned_project.expected_outcomes
    place_after_section: section_effect

tables:
  - table_id: table_schedule
    table_type: schedule
    title: スケジュール（採択〜補助事業終了後の展開）
    columns: [時期, 項目, 内容]
    data_path: planned_project.schedule
    place_after_section: section_4_2
  - table_id: table_expense
    table_type: expense_breakdown
    title: 経費明細
    columns: [区分, 明細, 金額（円）]
    data_path: expenses.breakdown
    place_after_section: section_effect
