program_id: monozukuri_v18
canonical_name: ものづくり・商業・サービス生産性向上促進補助金 第18次
quality_score_target: 88

# ものづくり補助金は10〜15ページ規模で、技術的な裏付けと費用対効果の数値が重視される
sections:
  - section_id: business_summary
    display_name: "1. 事業概要"
    target_chars: 800
    min_chars: 600
    max_chars: 1000
    requires_data_paths: [company.name, company.business_description]
  - section_id: project_purpose
    display_name: "2-1. 補助事業の目的・概要"
    target_chars: 1200
    min_chars: 900
    max_chars: 1500
    requires_data_paths: [planned_project.goal]
  - section_id: technical_advantage
    display_name: "2-2. 技術的優位性・差別化"
    target_chars: 1200
    min_chars: 900
    max_chars: 1500
    requires_data_paths: [strengths]
  - section_id: market_analysis
    display_name: "2-3. 市場性・事業性"
    target_chars: 1200
    min_chars: 900
    max_chars: 1500
    requires_data_paths: [target_market]
  - section_id: implementation_plan
    display_name: "3-1. 実施体制とスケジュール"
    target_chars: 1000
    min_chars: 800
    max_chars: 1300
    requires_data_paths: [planned_project.schedule]
  - section_id: investment_detail
    display_name: "3-2. 設備投資の詳細と経費根拠"
    target_chars: 1200
    min_chars: 900
    max_chars: 1500
    requires_data_paths: [expenses.breakdown]
  - section_id: financial_projection
    display_name: "4. 収益計画（5ヶ年）"
    target_chars: 1000
    min_chars: 800
    max_chars: 1300
    requires_data_paths: [planned_project.expected_outcomes]
  - section_id: productivity_kpi
    display_name: "5. 生産性向上のKPI"
    target_chars: 800
    min_chars: 600
    max_chars: 1000
  - section_id: wage_increase_commitment
    display_name: "6. 賃金引上げ計画"
    target_chars: 600
    min_chars: 450
    max_chars: 800
  - section_id: risk_response
    display_name: "7. リスクと対応策"
    target_chars: 600
    min_chars: 450
    max_chars: 800

charts:
  - chart_id: chart_revenue_trend
    chart_type: revenue_trend
    title: 過去3期の売上推移
    data_path: financial.past_3y_pl
    place_after_section: business_summary
  - chart_id: chart_effect_before_after
    chart_type: effect_before_after
    title: 補助事業導入による売上効果
    data_path: planned_project.expected_outcomes
    place_after_section: financial_projection

tables:
  - table_id: table_schedule
    table_type: schedule
    title: 実施スケジュール
    columns: [時期, 項目, 内容]
    data_path: planned_project.schedule
    place_after_section: implementation_plan
  - table_id: table_expense
    table_type: expense_breakdown
    title: 設備投資・経費明細
    columns: [区分, 明細, 金額（円）]
    data_path: expenses.breakdown
    place_after_section: investment_detail
